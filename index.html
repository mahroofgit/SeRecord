<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>SeRecorder Pro v26</title>
    <style>
      /* UI THEME: Deep Dark & Clean */
      /* UI THEME: Midnight Forest - Calm & Professional */
      :root {
        --bg: #09132a; /* Deep Midnight */
        --card: #1d2c45; /* Slate Blue */
        --accent: #86efac; /* Sage Accent */
        --text: #f1f5f9; /* Soft White */
        --sub: #94a3b8; /* Muted Slate */
        --border: #334155; /* Subtle Deep Blue Border */
        --danger: #fda4af; /* Muted Rose */
        --edit: #7dd3fc; /* Sky Blue */
        --row-alt: #162033; /* Darker Blue for nested rows */
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        height: 100vh;
        overflow-x: hidden;
      }

      /* Clean Revenue Card */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 22px;
        background: var(--card);
        border-radius: 24px;
        border: 1px solid var(--border);
        margin-top: 5px;
        margin-bottom: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      .revenue-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .revenue-label {
        color: var(--sub);
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 1.2px;
        text-transform: uppercase;
      }

      .grand-total-val {
        font-size: 2.2rem;
        font-weight: 900;
        color: var(--accent);
        letter-spacing: -1.5px;
        line-height: 1;
      }

      .settings-btn {
        width: 48px;
        height: 48px;
        background: rgba(0, 0, 0, 0.2) !important;
        border: 1px solid var(--border) !important;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        transition: transform 0.1s;
      }

      .settings-btn:active {
        transform: scale(0.9);
      }

      /* Floating Action Button */
      .fab {
        position: fixed;
        bottom: 30px;
        right: 25px;
        width: 65px;
        height: 65px;
        background: var(--accent);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.2rem;
        color: #000;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        z-index: 90;
        border: none;
        font-weight: bold;
      }

      /* Modal / Popup Logic */
      #logModal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        z-index: 500;
        display: none;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
        padding-top: env(safe-area-inset-top);
      }
      #logModal.open {
        display: flex;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .std-select,
      .std-input {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        color: white;
        padding: 15px;
        border-radius: 14px;
        font-size: 1rem;
        margin-bottom: 12px;
        box-sizing: border-box;
        appearance: none;
        -webkit-appearance: none;
      }

      .input-group {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 15px;
      }
      .input-box {
        background: var(--card);
        padding: 12px 5px;
        border-radius: 12px;
        text-align: center;
        border: 2px solid transparent;
        transition: 0.2s;
      }
      .input-box.active {
        border-color: var(--accent);
        background: #1a2a1d;
      }
      .box-label {
        font-size: 0.65rem;
        color: var(--sub);
        display: block;
        margin-bottom: 4px;
        text-transform: uppercase;
        font-weight: 600;
      }
      .box-val {
        font-size: 1.1rem;
        font-weight: 800;
      }

      .log-btn {
        background: var(--accent);
        color: #000;
        width: 100%;
        padding: 20px;
        border-radius: 18px;
        border: none;
        font-size: 1.3rem;
        font-weight: 800;
        margin-top: 10px;
        min-height: 65px; /* Ensures buttons don't collapse */
      }

      /* Modernized List Container */
      .list-container {
        background: rgba(29, 44, 69, 0.4);
        border-radius: 24px;
        border: 1px solid var(--border);
        margin-top: 10px;
        overflow: hidden;
        backdrop-filter: blur(10px);
      }

      .list-header-label,
      .summary-row {
        display: grid !important;
        /* This gives the product name 50% of the screen and keeps data tight */
        grid-template-columns: 1.5fr 60px 90px;
        justify-content: start; /* Pulls everything to the left */
        gap: 10px; /* Adds a controlled gap between columns */
        align-items: center;
        padding: 10px 15px;
        border-bottom: 1px solid var(--border);
        min-height: 20px; /* Slightly taller for better touch targets */
      }

      /* --- UPDATED: Category vs Variety Styling --- */
      .cat-row {
        background: rgba(255, 255, 255, 0.05);
        border-left: 2px solid var(--accent) !important; /* Thick bar for categories */
        font-weight: 800;
        color: #fff;
        min-height: 28px;
        padding-top: 4px;
        padding-bottom: 4px;
      }

      .variety-row {
        background: transparent;
        color: var(--sub);
        font-size: 0.85rem; /* Smaller font for sub-items */
        min-height: 18px;
        padding-top: 4px;
        padding-bottom: 4px;
      }

      .variety-row .col-product {
        padding-left: 28px !important; /* Stronger indentation for nesting */
        font-size: 0.8rem;
      }

      .variety-row .col-count,
      .variety-row .col-price {
        color: var(--sub); /* Muted data for sub-items */
        font-size: 0.85rem;
        opacity: 0.7;
        font-weight: 500;
      }

      .list-header-label span:nth-child(2) {
        text-align: center;
      }
      .list-header-label span:nth-child(3) {
        text-align: right;
      }

      /* Swipe items */
      .swipe-item {
        position: relative;
        background: var(--bg);
        overflow: hidden;
        border-bottom: 1px solid #2c2c2e;
      }
      .swipe-content {
        position: relative;
        background: var(--card);
        padding: 15px;
        z-index: 2;
        transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .swipe-actions {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 140px;
        display: flex;
        z-index: 1;
      }
      .action-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 0.75rem;
        font-weight: bold;
        text-transform: uppercase;
      }

      /* Numpad */
      .numpad-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        width: 100%;
        margin-top: 10px;
      }
      .num-btn {
        background: #2c2c2e;
        border: none;
        color: white;
        padding: 18px;
        border-radius: 15px;
        font-size: 1.6rem;
        font-weight: 700;
        min-height: 50px; /* Fixes the thin line issue */
      }

      .header .num-btn {
        border-radius: 14px;
        border: 1px solid var(--border);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        padding: 10px;
      }

      .header .num-btn:active {
        background: #3a3a3c !important;
        transform: scale(0.92);
      }

      .hidden {
        display: none !important;
      }

      #setupUI {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
        z-index: 600;
        display: none;
        flex-direction: column;
        padding: 20px;
        box-sizing: border-box;
        padding-top: env(safe-area-inset-top);
        overflow-y: auto;
      }

      #setupUI.open {
        display: flex;
      }

      /* Scroll area for products */
      #manageList {
        flex-grow: 1;
        overflow-y: auto;
        border: 1px solid var(--border);
        background: #111;
        margin-bottom: 15px;
        border-radius: 16px;
        -webkit-overflow-scrolling: touch;
      }

      /* Sticky actions at the bottom */
      .setup-actions {
        margin-top: auto;
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* The floating popup */
      #productEditor {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-height: 80vh;
        background: var(--card);
        z-index: 700;
        padding: 20px;
        border-radius: 24px;
        border: 1px solid var(--border);
        display: none;
        flex-direction: column;
        overflow-y: auto;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      }
      #productEditor.open {
        display: flex;
      }
      /* Dim the background when the popup is open */
      /* Only blur the background elements, not the popup itself */
      #setupUI.dimmed > *:not(#productEditor) {
        filter: blur(5px);
        pointer-events: none;
        opacity: 0.4;
      }
      /* Make the product list scrollable so it doesn't push buttons off-screen */
      #manageList {
        max-height: 40vh; /* Adjust this to show roughly 3-4 products at a time */
        overflow-y: auto;
        border: 1px solid var(--border);
        background: #111; /* Slightly darker to distinguish the scroll area */
        margin-bottom: 15px;
        -webkit-overflow-scrolling: touch; /* Smooth scrolling for iPhone */
      }
      /* Bottom Tab Bar */
      .tab-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 75px;
        background: rgba(28, 28, 30, 0.95);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-around;
        align-items: center;
        border-top: 1px solid var(--border);
        padding-bottom: env(safe-area-inset-bottom); /* iOS Handle support */
        z-index: 100;
      }

      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: var(--sub);
        font-size: 0.7rem;
        font-weight: 600;
        transition: 0.2s;
      }

      .tab-item.active {
        color: var(--accent); /* Your 3D printing brand green */
      }

      .tab-icon {
        font-size: 1.4rem;
        margin-bottom: 4px;
      }

      /* Adjust FAB so it doesn't overlap the new bar */
      .fab {
        bottom: 95px !important; /* Move above the tab bar */
      }

      /* Adjust body padding so list content isn't hidden behind the bar */
      body {
        padding-bottom: 100px;
      }
    </style>
  </head>
  <body>
    <div id="mainView">
      <div class="header">
        <div class="revenue-info">
          <div class="revenue-label">NET REVENUE</div>
          <div class="grand-total-val">$<span id="grandTotal">0.00</span></div>
        </div>

        <button class="settings-btn" onclick="toggleUI('setup')">⚙️</button>
      </div>

      <div id="section-breakdown">
        <div id="summaryArea" class="list-container"></div>
      </div>

      <div id="section-history" class="hidden">
        <div
          style="display: flex; gap: 10px; margin-bottom: 15px; padding: 0 5px"
        >
          <select
            class="std-select"
            id="filterCat"
            onchange="render()"
            style="flex: 1.5; margin-bottom: 0"
          ></select>
          <select
            class="std-select"
            id="sortMode"
            onchange="render()"
            style="flex: 1; margin-bottom: 0"
          >
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="high">High to Low</option>
            <option value="low">Low to High</option>
          </select>
        </div>
        <div id="historyLog" class="list-container"></div>
      </div>

      <div class="tab-bar">
        <div
          id="tab-breakdown"
          class="tab-item active"
          onclick="switchTab('breakdown')"
        >
          <div class="tab-icon">📊</div>
          <span>Dashboard</span>
        </div>
        <div id="tab-history" class="tab-item" onclick="switchTab('history')">
          <div class="tab-icon">📜</div>
          <span>Sales Log</span>
        </div>
      </div>

      <button class="fab" onclick="openLogModal()">+</button>
    </div>

    <div id="logModal">
      <div class="modal-header">
        <h2 id="modalTitle" style="margin: 0">Log Sale</h2>
        <button
          onclick="closeLogModal()"
          style="
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.8rem;
            font-weight: bold;
          "
        >
          ✕
        </button>
      </div>

      <select
        class="std-select"
        id="selCategory"
        onchange="loadVariants()"
      ></select>
      <select class="std-select" id="selVariant" onchange="autoFill()"></select>

      <div class="input-group">
        <div class="input-box" id="box-qty" onclick="setActiveField('qty')">
          <span class="box-label">Count</span>
          <div class="box-val" id="disp-qty">1</div>
        </div>
        <div class="input-box" id="box-unit" onclick="setActiveField('unit')">
          <span class="box-label">Unit $</span>
          <div class="box-val" id="disp-unit">0.00</div>
        </div>
        <div class="input-box" id="box-total" onclick="setActiveField('total')">
          <span class="box-label">Total $</span>
          <div class="box-val" id="disp-total">0.00</div>
        </div>
      </div>

      <div class="numpad-grid">
        <button class="num-btn" onclick="press('1')">1</button
        ><button class="num-btn" onclick="press('2')">2</button
        ><button class="num-btn" onclick="press('3')">3</button>
        <button class="num-btn" onclick="press('4')">4</button
        ><button class="num-btn" onclick="press('5')">5</button
        ><button class="num-btn" onclick="press('6')">6</button>
        <button class="num-btn" onclick="press('7')">7</button
        ><button class="num-btn" onclick="press('8')">8</button
        ><button class="num-btn" onclick="press('9')">9</button>
        <button class="num-btn" onclick="press('.')">.</button
        ><button class="num-btn" onclick="press('0')">0</button>
        <button
          class="num-btn"
          onclick="press('C')"
          style="color: var(--danger)"
        >
          C
        </button>
      </div>
      <button class="log-btn" id="mainLogBtn" onclick="processSale()">
        LOG SALE
      </button>
    </div>

    <div id="setupUI" class="hidden">
      <h2 style="margin-top: 0">Product Setup</h2>

      <div
        class="section-title"
        style="
          margin: 10px 0;
          color: var(--sub);
          font-size: 0.8rem;
          font-weight: bold;
        "
      >
        MANAGE PRODUCTS
      </div>

      <div id="manageList" class="list-container"></div>

      <div class="setup-actions">
        <button
          class="log-btn"
          onclick="openProductEditor()"
          style="margin-bottom: 20px; background: var(--accent); color: black"
        >
          + NEW PRODUCT
        </button>

        <div
          style="
            background: var(--card);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--border);
          "
        >
          <button
            class="num-btn"
            style="
              width: 100%;
              font-size: 0.9rem;
              margin-bottom: 12px;
              background: #444;
            "
            onclick="exportJSON()"
          >
            Backup JSON
          </button>
          <button
            class="num-btn"
            style="width: 100%; font-size: 0.9rem; background: #444"
            onclick="importJSON()"
          >
            Restore JSON
          </button>
        </div>

        <button
          class="log-btn"
          style="background: #2c2c2e; color: #fff; margin-top: 20px"
          onclick="toggleUI('tracker')"
        >
          BACK TO SALES
        </button>
      </div>

      <div id="productEditor" class="hidden">
        <div class="modal-header">
          <h3 id="editTitle" style="margin: 0">Product Details</h3>
          <button
            onclick="closeProductEditor()"
            style="
              background: none;
              border: none;
              color: var(--danger);
              font-size: 1.8rem;
            "
          >
            ✕
          </button>
        </div>
        <input
          class="std-input"
          id="newCat"
          placeholder="Category Name (e.g. Plant Pot)"
        />
        <div id="variantList"></div>
        <button
          class="num-btn"
          style="width: 100%; margin-bottom: 12px; font-size: 1rem"
          onclick="addVarRow()"
        >
          + Add Variety
        </button>
        <button
          class="log-btn"
          onclick="saveConfig()"
          style="background: var(--edit); color: white"
        >
          SAVE PRODUCT
        </button>
      </div>
    </div>

    <script>
      // Core Storage Keys
      let config = JSON.parse(localStorage.getItem("3D_CFG_v21")) || {
        Sample: { Standard: 10.0 },
      };
      let sales = JSON.parse(localStorage.getItem("3D_SLS_v21")) || [];
      let activeField = "qty",
        buffers = { qty: "1", unit: "0", total: "0" },
        editId = null;
      isFirstKey = true;

      function openLogModal() {
        document.getElementById("logModal").classList.add("open");
        initApp();
        setActiveField("qty");
      }
      function closeLogModal() {
        document.getElementById("logModal").classList.remove("open");
        editId = null;
        document.getElementById("mainLogBtn").innerText = "LOG SALE";
        document.getElementById("mainLogBtn").style.background =
          "var(--accent)";
        document.getElementById("mainLogBtn").style.color = "black";
      }

      // --- BUFFER & NUMPAD LOGIC ---
      function setActiveField(f) {
        activeField = f;
        isFirstKey = true;
        document
          .querySelectorAll(".input-box")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById(`box-${f}`).classList.add("active");
      }

      function press(n) {
        if (n === "C") {
          buffers[activeField] = activeField === "qty" ? "1" : "0";
          isFirstKey = true;
        } else {
          // NEW Logic: Overwrite if it's the first key, otherwise append
          if (isFirstKey) {
            if (n === ".") buffers[activeField] = "0.";
            else buffers[activeField] = n;
            isFirstKey = false; // Next key in the same field will append
          } else {
            if (n === "." && buffers[activeField].includes(".")) return;
            buffers[activeField] += n;
          }
        }

        // Keep your existing calculation logic below
        let q = parseFloat(buffers.qty) || 0,
          u = parseFloat(buffers.unit) || 0,
          t = parseFloat(buffers.total) || 0;
        if (activeField === "qty" || activeField === "unit")
          buffers.total = (q * u).toFixed(2);
        else if (activeField === "total")
          buffers.unit = q > 0 ? (t / q).toFixed(2) : "0";

        updateDisplays();
      }

      function updateDisplays() {
        document.getElementById("disp-qty").innerText = buffers.qty;
        document.getElementById("disp-unit").innerText = buffers.unit;
        document.getElementById("disp-total").innerText = buffers.total;
      }

      function switchTab(tab) {
        // Update Tab UI
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document.getElementById(`tab-${tab}`).classList.add("active");

        // Toggle Visibility
        if (tab === "breakdown") {
          document
            .getElementById("section-breakdown")
            .classList.remove("hidden");
          document.getElementById("section-history").classList.add("hidden");
        } else {
          document.getElementById("section-breakdown").classList.add("hidden");
          document.getElementById("section-history").classList.remove("hidden");
        }

        render(); // Refresh lists
      }

      // --- DATA PROCESSING ---
      function processSale() {
        let q = parseFloat(buffers.qty) || 0,
          t = parseFloat(buffers.total) || 0;
        if (q <= 0 || t <= 0) return;
        const sale = {
          id: editId || Date.now(),
          cat: document.getElementById("selCategory").value,
          var: document.getElementById("selVariant").value,
          qty: q,
          unit: parseFloat(buffers.unit) || 0,
          total: t,
          ts: new Date().toLocaleString("en-GB", {
            day: "numeric",
            month: "short",
            hour: "2-digit",
            minute: "2-digit",
          }),
          rawTs: editId ? sales.find((x) => x.id === editId).rawTs : Date.now(),
        };
        if (editId) sales = sales.map((s) => (s.id === editId ? sale : s));
        else sales.unshift(sale);
        save();
        closeLogModal();
      }

      function render() {
        let grand = 0,
          grouped = {},
          f = document.getElementById("filterCat").value,
          sMode = document.getElementById("sortMode").value;
        sales.forEach((s) => {
          grand += s.total;
          if (!grouped[s.cat]) grouped[s.cat] = { total: 0, qty: 0, vars: {} };
          grouped[s.cat].total += s.total;
          grouped[s.cat].qty += s.qty;
          if (!grouped[s.cat].vars[s.var])
            grouped[s.cat].vars[s.var] = { total: 0, qty: 0 };
          grouped[s.cat].vars[s.var].total += s.total;
          grouped[s.cat].vars[s.var].qty += s.qty;
        });
        document.getElementById("grandTotal").innerText = grand.toLocaleString(
          undefined,
          { minimumFractionDigits: 2, maximumFractionDigits: 2 }
        );

        // Summary Section
        let innerContent = `
  <div class="list-header-label">
    <span>PRODUCT</span>
    <span>COUNT</span>
    <span>REVENUE</span>
  </div>`;

        for (let c in grouped) {
          // 1. Render Category Row
          innerContent += `
    <div class="summary-row cat-row">
      <span class="col-product">${c}</span>
      <span class="col-count">${grouped[c].qty}</span>
      <span class="col-price">$${grouped[c].total.toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      })}</span>
    </div>`;

          // 2. Render Sub-category (Variety) Rows
          for (let v in grouped[c].vars) {
            innerContent += `
      <div class="summary-row variety-row">
        <span class="col-product">${v}</span>
        <span class="col-count">${grouped[c].vars[v].qty}</span>
        <span class="col-price">$${grouped[c].vars[v].total.toFixed(2)}</span>
      </div>`;
          }
        }

        document.getElementById("summaryArea").innerHTML = `
          <div class="list-container">${innerContent}</div>
        `;
        // History Log
        let list = f === "All" ? [...sales] : sales.filter((x) => x.cat === f);
        if (sMode === "high") list.sort((a, b) => b.total - a.total);
        else if (sMode === "low") list.sort((a, b) => a.total - b.total);
        else if (sMode === "oldest") list.sort((a, b) => a.rawTs - b.rawTs);
        else list.sort((a, b) => b.rawTs - a.rawTs);

        document.getElementById("historyLog").innerHTML = list
          .map(
            (s) => `
                <div class="swipe-item">
                    <div class="swipe-actions">
                        <div class="action-btn" style="background:var(--edit)" onclick="triggerEdit(${
                          s.id
                        })">Edit</div>
                        <div class="action-btn" style="background:var(--danger)" onclick="if(confirm('Delete this sale?')){sales=sales.filter(x=>x.id!=${
                          s.id
                        });save();}">Del</div>
                    </div>
                    <div class="swipe-content" ontouchstart="hStart(event)" ontouchmove="hMove(event, this)" ontouchend="hEnd(event, this)">
                        <div><b style="font-size:1rem;">${s.qty}x ${
              s.var
            }</b><br><small style="color:var(--sub)">${s.cat} • ${
              s.ts
            }</small></div>
                        <b style="color:var(--accent); font-size:1.1rem;">$${s.total.toFixed(
                          2
                        )}</b>
                    </div>
                </div>`
          )
          .join("");
      }

      // --- SWIPE GESTURES ---
      let tX = 0;
      function hStart(e) {
        tX = e.touches[0].clientX;
      }
      function hMove(e, el) {
        let d = tX - e.touches[0].clientX;
        if (d > 0 && d < 150) el.style.transform = `translateX(-${d}px)`;
      }
      function hEnd(e, el) {
        let d = tX - e.changedTouches[0].clientX;
        el.style.transform = d > 70 ? `translateX(-140px)` : `translateX(0)`;
      }

      function triggerEdit(id) {
        const s = sales.find((x) => x.id === id);
        if (!s) return;
        editId = id;
        openLogModal();
        document.getElementById("selCategory").value = s.cat;
        loadVariants();
        document.getElementById("selVariant").value = s.var;
        buffers = {
          qty: s.qty.toString(),
          unit: s.unit.toString(),
          total: s.total.toString(),
        };
        updateDisplays();
        document.getElementById("mainLogBtn").innerText = "UPDATE SALE";
        document.getElementById("mainLogBtn").style.background = "var(--edit)";
        document.getElementById("mainLogBtn").style.color = "white";
      }

      // --- CONFIG & SYSTEM ---
      function save() {
        localStorage.setItem("3D_CFG_v21", JSON.stringify(config));
        localStorage.setItem("3D_SLS_v21", JSON.stringify(sales));
        render();
      }
      function toggleUI(m) {
        const setup = document.getElementById("setupUI");
        if (m === "setup") {
          setup.classList.add("open");
          setup.classList.remove("hidden");
          renderManage();
        } else {
          setup.classList.remove("open");
          setup.classList.add("hidden");
        }
      }
      function initApp() {
        const cats = Object.keys(config);
        document.getElementById("selCategory").innerHTML = cats
          .map((c) => `<option value="${c}">${c}</option>`)
          .join("");
        document.getElementById("filterCat").innerHTML =
          `<option value="All">All Categories</option>` +
          cats.map((c) => `<option value="${c}">${c}</option>`).join("");
        loadVariants();
      }
      function loadVariants() {
        const c = document.getElementById("selCategory").value;
        if (!config[c]) return;
        document.getElementById("selVariant").innerHTML = Object.keys(config[c])
          .map((v) => `<option value="${v}">${v}</option>`)
          .join("");
        autoFill();
      }
      function autoFill() {
        const c = document.getElementById("selCategory").value,
          v = document.getElementById("selVariant").value;
        if (!config[c] || !config[c][v]) return;
        buffers = {
          qty: "1",
          unit: config[c][v].toString(),
          total: config[c][v].toString(),
        };
        updateDisplays();
      }

      function addVarRow(v = "", p = "") {
        const d = document.createElement("div");
        d.style = "display:flex; gap:10px; margin-bottom:12px;";
        d.innerHTML = `<input class="std-input vn" placeholder="Variety" value="${v}" style="flex:2; margin:0;"><input class="std-input vp" type="number" placeholder="$" value="${p}" style="flex:1; margin:0;">`;
        document.getElementById("variantList").appendChild(d);
      }
      function saveConfig() {
        const c = document.getElementById("newCat").value;
        if (!c) return;
        config[c] = {};
        document.querySelectorAll(".vn").forEach((n, i) => {
          if (n.value)
            config[c][n.value] =
              parseFloat(document.querySelectorAll(".vp")[i].value) || 0;
        });
        save();
        initApp();
        toggleUI("tracker");
      }
      function renderManage() {
        document.getElementById("manageList").innerHTML = Object.keys(config)
          .map(
            (c) =>
              `<div class="summary-row"><span>${c}</span><button class="num-btn" style="padding:8px 15px; font-size:0.75rem;" onclick="editCfg('${c}')">Edit</button></div>`
          )
          .join("");
      }
      function openProductEditor(catName = "") {
        const editor = document.getElementById("productEditor");
        const setupPage = document.getElementById("setupUI");

        document.getElementById("newCat").value = catName;
        document.getElementById("variantList").innerHTML = "";
        document.getElementById("editTitle").innerText = catName
          ? "Edit Product"
          : "Add Product";

        if (catName) {
          // Loads existing 3D print data into the popup rows
          for (let v in config[catName]) addVarRow(v, config[catName][v]);
        } else {
          addVarRow(); // Fresh row for new item
        }

        editor.classList.remove("hidden");
        editor.classList.add("open");
        setupPage.classList.add("dimmed"); // Applies the blur/dim effect
      }

      function closeProductEditor() {
        const editor = document.getElementById("productEditor");
        const setupPage = document.getElementById("setupUI");
        editor.classList.add("hidden");
        editor.classList.remove("open");
        setupPage.classList.remove("dimmed");
      }

      // Override your old editCfg to use the popup instead
      function editCfg(c) {
        openProductEditor(c);
      }

      // Update saveConfig to close the popup automatically
      function saveConfig() {
        const c = document.getElementById("newCat").value;
        if (!c) return;

        // Reset the specific category to rebuild from popup inputs
        config[c] = {};
        document.querySelectorAll(".vn").forEach((n, i) => {
          if (n.value) {
            config[c][n.value] =
              parseFloat(document.querySelectorAll(".vp")[i].value) || 0;
          }
        });

        save();
        initApp();
        closeProductEditor(); // Close the popup
        renderManage(); // Refresh the list in the background
      }

      // --- BACKUP & RESTORE ---
      function exportJSON() {
        const b = new Blob([JSON.stringify({ config, sales }, null, 2)], {
          type: "application/json",
        });
        const now = new Date();
        const dateStr = `${now.getDate()}-${
          now.getMonth() + 1
        }-${now.getFullYear()}_${now.getHours()}-${now.getMinutes()}`;
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = `SeRecord_${dateStr}.json`;
        a.click();
      }
      function importJSON() {
        const i = document.createElement("input");
        i.type = "file";
        i.onchange = (e) => {
          const r = new FileReader();
          r.onload = () => {
            const d = JSON.parse(r.result);
            config = d.config;
            sales = d.sales;
            save();
            initApp();
            toggleUI("tracker");
          };
          r.readAsText(e.target.files[0]);
        };
        i.click();
      }

      window.onload = () => {
        initApp();
        render();
      };
    </script>
  </body>
</html>
