<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Sales Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #34c759; --text: #fff; --sub: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        /* Dashboard */
        .dashboard { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .total-label { color: var(--sub); font-size: 0.8rem; text-transform: uppercase; }
        .total-val { font-size: 2rem; font-weight: 800; }

        /* Form */
        .form-group { margin-bottom: 15px; }
        label { display: block; color: var(--sub); font-size: 0.8rem; margin-bottom: 5px; margin-left: 5px; }
        select, input { 
            width: 100%; background: #2c2c2e; border: none; color: white; 
            padding: 15px; border-radius: 10px; font-size: 1rem; box-sizing: border-box;
        }
        
        .flex-row { display: flex; gap: 10px; }
        .flex-row > div { flex: 1; }

        .log-btn { 
            background: var(--accent); color: black; font-weight: bold; width: 100%; 
            padding: 18px; border-radius: 12px; border: none; font-size: 1.1rem; margin-top: 10px;
        }

        /* History */
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; }
        .history-list { margin-top: 10px; }
        .sale-card { 
            background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sale-info { font-size: 0.9rem; }
        .sale-date { color: var(--sub); font-size: 0.7rem; display: block; }
        .sale-price { font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="total-label">Grand Total Sold</div>
        <div class="total-val">$<span id="grandTotal">0.00</span></div>
    </div>

    <div class="form-group">
        <label>Product Category</label>
        <select id="mainCategory" onchange="updateVariations()">
            <option value="Plant Pot">Plant Pot</option>
            <option value="Cookie Cutter">Cookie Cutter</option>
        </select>
    </div>

    <div class="form-group" id="varGroup">
        <label>Variety / Color</label>
        <select id="subCategory">
            <option>Gray Plant</option>
            <option>Gray Flower</option>
            <option>Gold Plant</option>
            <option>Gold Flowers</option>
        </select>
    </div>

    <div class="flex-row">
        <div class="form-group">
            <label id="qtyLabel">Quantity</label>
            <input type="number" id="qty" value="1" oninput="calculateTotal()">
        </div>
        <div class="form-group">
            <label id="priceLabel">Total Price ($)</label>
            <input type="number" step="0.01" id="price" placeholder="0.00">
        </div>
    </div>

    <button class="log-btn" onclick="logSale()">LOG SALE</button>

    <div class="history-header">
        <span class="total-label">Recent Sales</span>
        <button onclick="exportData()" style="background:none; border:none; color:var(--accent); font-size:0.8rem;">Export JSON</button>
    </div>
    <div class="history-list" id="historyLog"></div>

    <script>
        let sales = JSON.parse(localStorage.getItem('printSales_v2')) || [];
        const config = {
            "Plant Pot": { hasVar: true, defaultPrice: 15, varieties: ["Gray Plant", "Gray Flower", "Gold Plant", "Gold Flowers"] },
            "Cookie Cutter": { hasVar: false, defaultPrice: 4, varieties: [] }
        };

        function updateVariations() {
            const cat = document.getElementById('mainCategory').value;
            const varGroup = document.getElementById('varGroup');
            const subSelect = document.getElementById('subCategory');
            const priceInput = document.getElementById('price');
            const qtyInput = document.getElementById('qty');

            if (config[cat].hasVar) {
                varGroup.style.display = 'block';
                subSelect.innerHTML = config[cat].varieties.map(v => `<option>${v}</option>`).join('');
                priceInput.value = config[cat].defaultPrice;
            } else {
                varGroup.style.display = 'none';
                priceInput.value = config[cat].defaultPrice * qtyInput.value;
            }
        }

        function calculateTotal() {
            const cat = document.getElementById('mainCategory').value;
            if (cat === "Cookie Cutter") {
                const qty = document.getElementById('qty').value;
                document.getElementById('price').value = (qty * config[cat].defaultPrice).toFixed(2);
            }
        }

        function logSale() {
            const cat = document.getElementById('mainCategory').value;
            const sub = config[cat].hasVar ? document.getElementById('subCategory').value : "";
            const qty = document.getElementById('qty').value;
            const total = document.getElementById('price').value;

            const entry = {
                id: Date.now(),
                name: sub || cat,
                qty: qty,
                total: parseFloat(total),
                date: new Date().toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            };

            sales.unshift(entry);
            localStorage.setItem('printSales_v2', JSON.stringify(sales));
            render();
        }

        function render() {
            const log = document.getElementById('historyLog');
            let grandTotal = 0;
            log.innerHTML = '';

            sales.forEach((s, i) => {
                grandTotal += s.total;
                log.innerHTML += `
                    <div class="sale-card" onclick="deleteItem(${i})">
                        <div class="sale-info">
                            <strong>${s.qty}x ${s.name}</strong>
                            <span class="sale-date">${s.date}</span>
                        </div>
                        <div class="sale-price">$${s.total.toFixed(2)}</div>
                    </div>
                `;
            });
            document.getElementById('grandTotal').innerText = grandTotal.toFixed(2);
        }

        function deleteItem(i) { if(confirm("Delete sale?")) { sales.splice(i,1); localStorage.setItem('printSales_v2', JSON.stringify(sales)); render(); } }
        
        function exportData() {
            window.open("data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(sales)));
        }

        updateVariations();
        render();
    </script>
</body>
</html>
