<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Sales Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #34c759; --text: #fff; --sub: #8e8e93; --border: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
        
        .dashboard { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center;}
        .total-val { font-size: 1.8rem; font-weight: 800; color: var(--accent); }

        .form-group { margin-bottom: 12px; }
        label { display: block; color: var(--sub); font-size: 0.7rem; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        
        select, input.std { width: 100%; background: #2c2c2e; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }

        /* Tri-Input Logic */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .box { background: #2c2c2e; padding: 10px; border-radius: 10px; border: 1px solid var(--border); position: relative; text-align: center; }
        .box.active { border-color: var(--accent); background: #263529; }
        .box-label { font-size: 0.6rem; color: var(--sub); display: block; margin-bottom: 2px; }
        .box-val { font-size: 1.1rem; font-weight: bold; color: white; }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 15px; }
        .num-btn { background: #2c2c2e; border: none; color: white; padding: 15px; border-radius: 8px; font-size: 1.2rem; }
        .num-btn:active { background: #444; }

        .log-btn { background: var(--accent); color: black; font-weight: bold; width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 1.1rem; }

        /* Summary & Grouping */
        .summary-box { background: #1c1c1e; border-radius: 12px; padding: 12px; margin-top: 20px; }
        .group-header { background: #2c2c2e; padding: 8px 12px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; font-weight: bold; color: var(--accent); font-size: 0.9rem;}
        .sub-row { display: flex; justify-content: space-between; padding: 8px 12px; font-size: 0.85rem; border-bottom: 1px solid #222; color: #ccc; }
        
        .settings-btn { background: #2c2c2e; color: var(--sub); border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 20px; font-size: 0.8rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div>
            <div style="color:var(--sub); font-size:0.7rem;">GRAND TOTAL</div>
            <div class="total-val">$<span id="grandTotal">0.00</span></div>
        </div>
        <button onclick="toggleSettings()" style="background:none; border:1px solid #444; color:#666; border-radius:5px; padding:5px 10px;">Setup</button>
    </div>

    <div id="mainUI">
        <div class="form-group">
            <label>Product Category</label>
            <select id="selCategory" onchange="loadVariants()"></select>
        </div>
        <div class="form-group" id="variantGroup">
            <label>Variety / Color</label>
            <select id="selVariant" onchange="autoFillDefault()"></select>
        </div>

        <div class="input-grid">
            <div class="box" id="box-qty" onclick="setActive('qty')"><span class="box-label">COUNT</span><div class="box-val" id="disp-qty">1</div></div>
            <div class="box" id="box-unit" onclick="setActive('unit')"><span class="box-label">UNIT $</span><div class="box-val" id="disp-unit">0.00</div></div>
            <div class="box" id="box-total" onclick="setActive('total')"><span class="box-label">TOTAL $</span><div class="box-val" id="disp-total">0.00</div></div>
        </div>

        <div class="numpad">
            <button class="num-btn" onclick="press('1')">1</button><button class="num-btn" onclick="press('2')">2</button><button class="num-btn" onclick="press('3')">3</button>
            <button class="num-btn" onclick="press('4')">4</button><button class="num-btn" onclick="press('5')">5</button><button class="num-btn" onclick="press('6')">6</button>
            <button class="num-btn" onclick="press('7')">7</button><button class="num-btn" onclick="press('8')">8</button><button class="num-btn" onclick="press('9')">9</button>
            <button class="num-btn" onclick="press('.')">.</button><button class="num-btn" onclick="press('0')">0</button><button class="num-btn" onclick="press('C')" style="color:#ff453a">C</button>
        </div>

        <button class="log-btn" onclick="logSale()">LOG SALE</button>
        
        <div id="summaryArea"></div>
    </div>

    <div id="settingsUI" class="hidden">
        <h3>Product Setup</h3>
        <div class="form-group"><label>Product Name</label><input class="std" id="newProdName" placeholder="e.g. Vase"></div>
        <div class="form-group"><label>Default Price</label><input class="std" type="number" id="newProdPrice" value="10"></div>
        <div class="form-group"><label>Varieties (Comma separated)</label><input class="std" id="newProdVars" placeholder="Small, Large, Red"></div>
        <button class="log-btn" onclick="addNewProduct()">ADD PRODUCT</button>
        <button class="settings-btn" onclick="toggleSettings()">BACK TO SALES</button>
        <button class="settings-btn" style="color: #ff453a;" onclick="clearAll()">RESET ALL DATA</button>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('3d_config')) || {
            "Plant Pot": { price: 15, vars: ["Gray Plant", "Gray Flower", "Gold Plant", "Gold Flowers"] },
            "Cookie Cutter": { price: 4, vars: ["Standard"] }
        };
        let sales = JSON.parse(localStorage.getItem('3d_sales_v5')) || [];
        let activeField = 'total', buffers = { qty: "1", unit: "0", total: "0" };

        function toggleSettings() {
            document.getElementById('mainUI').classList.toggle('hidden');
            document.getElementById('settingsUI').classList.toggle('hidden');
        }

        function addNewProduct() {
            const name = document.getElementById('newProdName').value;
            const price = document.getElementById('newProdPrice').value;
            const vars = document.getElementById('newProdVars').value.split(',').map(v => v.trim());
            if(!name) return;
            config[name] = { price: parseFloat(price), vars: vars.length > 0 && vars[0] !== "" ? vars : ["Standard"] };
            localStorage.setItem('3d_config', JSON.stringify(config));
            initDropdowns(); toggleSettings();
        }

        function initDropdowns() {
            const sel = document.getElementById('selCategory');
            sel.innerHTML = Object.keys(config).map(k => `<option value="${k}">${k}</option>`).join('');
            loadVariants();
        }

        function loadVariants() {
            const cat = document.getElementById('selCategory').value;
            const vGroup = document.getElementById('variantGroup');
            const vSel = document.getElementById('selVariant');
            vSel.innerHTML = config[cat].vars.map(v => `<option value="${v}">${v}</option>`).join('');
            vGroup.style.display = config[cat].vars[0] === "Standard" && config[cat].vars.length === 1 ? 'none' : 'block';
            autoFillDefault();
        }

        function autoFillDefault() {
            const cat = document.getElementById('selCategory').value;
            buffers.qty = "1";
            buffers.unit = config[cat].price.toString();
            syncMath('unit'); updateDisplays();
        }

        function setActive(f) { activeField = f; document.querySelectorAll('.box').forEach(b => b.classList.remove('active')); document.getElementById(`box-${f}`).classList.add('active'); buffers[f] = ""; }
        
        function press(n) { 
            if (n === 'C') buffers[activeField] = ""; 
            else buffers[activeField] += n; 
            syncMath(activeField); updateDisplays(); 
        }

        function syncMath(src) {
            let q = parseFloat(buffers.qty) || 0, u = parseFloat(buffers.unit) || 0, t = parseFloat(buffers.total) || 0;
            if (src === 'qty' || src === 'unit') buffers.total = (q * u).toFixed(2);
            else if (src === 'total' && q > 0) buffers.unit = (t / q).toFixed(2);
        }

        function updateDisplays() {
            document.getElementById('disp-qty').innerText = buffers.qty || "0";
            document.getElementById('disp-unit').innerText = buffers.unit || "0.00";
            document.getElementById('disp-total').innerText = buffers.total || "0.00";
        }

        function logSale() {
            const cat = document.getElementById('selCategory').value;
            const v = document.getElementById('selVariant').value;
            sales.unshift({ cat: cat, var: v, qty: parseFloat(buffers.qty), unit: parseFloat(buffers.unit), total: parseFloat(buffers.total), date: new Date().toLocaleString([], {month:'short', day:'numeric'}) });
            localStorage.setItem('3d_sales_v5', JSON.stringify(sales));
            render();
        }

        function render() {
            let grandTotal = 0, grouped = {};
            sales.forEach(s => {
                grandTotal += s.total;
                if (!grouped[s.cat]) grouped[s.cat] = { total: 0, subs: {} };
                grouped[s.cat].total += s.total;
                grouped[s.cat].subs[s.var] = (grouped[s.cat].subs[s.var] || 0) + s.total;
            });

            let html = '<label style="margin-top:20px">Sales Summary</label>';
            for (let cat in grouped) {
                html += `<div class="group-header"><span>${cat}</span><span>$${grouped[cat].total.toFixed(2)}</span></div>`;
                for (let sub in grouped[cat].subs) {
                    html += `<div class="sub-row"><span>└ ${sub}</span><span>$${grouped[cat].subs[sub].toFixed(2)}</span></div>`;
                }
            }
            document.getElementById('summaryArea').innerHTML = html;
            document.getElementById('grandTotal').innerText = grandTotal.toFixed(2);
        }

        function clearAll() { if(confirm("Wipe everything?")) { localStorage.clear(); location.reload(); } }
        window.onload = () => { initDropdowns(); render(); setActive('total'); };
    </script>
</body>
</html>
