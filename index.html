<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Print Sales</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --accent: #4caf50;
            --pot-color: #9e9e9e;
            --cutter-color: #ff9800;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- Header & Totals --- */
        .dashboard {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--accent);
        }

        .grand-total { font-size: 1.5rem; font-weight: bold; }
        .grand-total span { color: var(--accent); }

        /* --- Product Grid --- */
        .section-label { font-size: 0.9rem; color: #888; margin: 10px 0 5px 5px; text-transform: uppercase; }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--card);
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); background: #333; }
        .btn.active { border-color: var(--accent); background: #2e3d2e; }

        /* --- Entry Modal/Panel --- */
        .entry-panel {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            position: sticky;
            bottom: 10px;
        }

        .input-row { display: flex; gap: 10px; margin-top: 10px; }
        
        .input-group { flex: 1; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.7rem; color: #888; margin-bottom: 4px; }
        
        input {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
        }

        .log-btn {
            background: var(--accent);
            color: black;
            font-weight: bold;
            padding: 15px;
            border-radius: 8px;
            border: none;
            margin-top: 15px;
            width: 100%;
            font-size: 1.1rem;
        }

        /* --- Log/History --- */
        .history { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .log-item {
            display: flex;
            justify-content: space-between;
            background: #1a1a1a;
            padding: 10px;
            border-bottom: 1px solid #333;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div>
            <div style="font-size: 0.8rem; color: #888;">Grand Total</div>
            <div class="grand-total">$<span id="grandTotal">0.00</span></div>
        </div>
        <button onclick="exportData()" style="background:none; border:1px solid #444; color:#888; border-radius:5px; padding:5px 10px;">Export JSON</button>
    </div>

    <div class="section-label">Plant Pots (Varieties)</div>
    <div class="grid" id="potGrid">
        <div class="btn" onclick="selectItem('Gray Plant', 15)">Gray Plant</div>
        <div class="btn" onclick="selectItem('Gray Flower', 15)">Gray Flower</div>
        <div class="btn" onclick="selectItem('Gold Plant', 15)">Gold Plant</div>
        <div class="btn" onclick="selectItem('Gold Flowers', 15)">Gold Flowers</div>
    </div>

    <div class="section-label">Others</div>
    <div class="grid">
        <div class="btn" onclick="selectItem('Cookie Cutter', 4)">Cookie Cutter</div>
    </div>

    <div class="history" id="historyLog">
        </div>

    <div class="entry-panel">
        <div id="selectedLabel" style="font-weight: bold; color: var(--accent);">Select an Item</div>
        <div class="input-row">
            <div class="input-group">
                <label>Quantity</label>
                <input type="number" id="qtyInput" value="1">
            </div>
            <div class="input-group">
                <label>Total Price ($)</label>
                <input type="number" step="0.01" id="priceInput" placeholder="0.00">
            </div>
        </div>
        <button class="log-btn" onclick="logSale()">LOG SALE</button>
    </div>

    <script>
        let sales = JSON.parse(localStorage.getItem('printSales')) || [];
        let currentItem = null;

        function selectItem(name, defaultPrice) {
            currentItem = name;
            document.getElementById('selectedLabel').innerText = name;
            document.getElementById('priceInput').value = defaultPrice;
            document.getElementById('qtyInput').value = 1;
            
            // Highlight active button
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function logSale() {
            if (!currentItem) return alert("Select an item first!");
            
            const qty = parseFloat(document.getElementById('qtyInput').value);
            const total = parseFloat(document.getElementById('priceInput').value);

            const entry = {
                id: Date.now(),
                item: currentItem,
                qty: qty,
                total: total,
                date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            sales.unshift(entry);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('printSales', JSON.stringify(sales));
            render();
        }

        function render() {
            const log = document.getElementById('historyLog');
            const totalDisplay = document.getElementById('grandTotal');
            
            let grandTotal = 0;
            log.innerHTML = '';

            sales.forEach((s, index) => {
                grandTotal += s.total;
                log.innerHTML += `
                    <div class="log-item" onclick="deleteSale(${index})">
                        <span><strong>${s.qty}x</strong> ${s.item} <small style="color:#666">${s.date}</small></span>
                        <span style="color:var(--accent)">$${s.total.toFixed(2)}</span>
                    </div>
                `;
            });

            totalDisplay.innerText = grandTotal.toFixed(2);
        }

        function deleteSale(index) {
            if(confirm("Delete this entry?")) {
                sales.splice(index, 1);
                saveAndRefresh();
            }
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(sales));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "sales_export.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        render(); // Initial load
    </script>
</body>
</html>
